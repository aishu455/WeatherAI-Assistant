<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather AI Assistant</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            display: flex;
            justify-content: flex-end;
        }

        .user-message .bubble {
            background: #667eea;
            color: white;
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            word-wrap: break-word;
        }

        .ai-message {
            display: flex;
            justify-content: flex-start;
        }

        .ai-message .bubble {
            background: #e9ecef;
            color: #333;
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #667eea;
            font-style: italic;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .input-container {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 20px;
            display: flex;
            gap: 10px;
        }

        .input-box {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 25px;
            padding: 12px 20px;
            font-size: 0.95em;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 12px 16px;
            border-radius: 10px;
            border-left: 4px solid #d32f2f;
        }

        .timestamp {
            font-size: 0.75em;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function WeatherApp() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const chatContainerRef = useRef(null);

            const scrollToBottom = () => {
                if (chatContainerRef.current) {
                    chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
                }
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const sendMessage = async () => {
                if (!input.trim()) return;

                const userQuery = input.trim();
                setInput('');
                
                // Add user message
                const userMsg = {
                    type: 'user',
                    text: userQuery,
                    timestamp: new Date().toLocaleTimeString()
                };
                setMessages(prev => [...prev, userMsg]);
                setLoading(true);

                try {
                    const response = await fetch('http://localhost:8000/api/weather', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ query: userQuery })
                    });

                    const data = await response.json();

                    if (data.success) {
                        const aiMsg = {
                            type: 'ai',
                            text: data.response,
                            timestamp: new Date().toLocaleTimeString()
                        };
                        setMessages(prev => [...prev, aiMsg]);
                    } else {
                        const errorMsg = {
                            type: 'error',
                            text: `Error: ${data.error}`,
                            timestamp: new Date().toLocaleTimeString()
                        };
                        setMessages(prev => [...prev, errorMsg]);
                    }
                } catch (error) {
                    const errorMsg = {
                        type: 'error',
                        text: `Connection error: ${error.message}. Make sure backend is running on http://localhost:8000`,
                        timestamp: new Date().toLocaleTimeString()
                    };
                    setMessages(prev => [...prev, errorMsg]);
                } finally {
                    setLoading(false);
                }
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>🌤️ Weather AI Assistant</h1>
                        <p>Ask me anything about the weather in any city!</p>
                    </div>

                    <div className="chat-container" ref={chatContainerRef}>
                        {messages.length === 0 ? (
                            <div style={{ textAlign: 'center', color: '#999', marginTop: '40px' }}>
                                <p style={{ fontSize: '3em', marginBottom: '10px' }}>👋</p>
                                <p>Start by asking about weather in any city!</p>
                                <p style={{ fontSize: '0.9em', marginTop: '20px' }}>
                                    Example: "What is the weather in Pune?"
                                </p>
                            </div>
                        ) : (
                            messages.map((msg, idx) => (
                                <div key={idx} className="message">
                                    {msg.type === 'user' && (
                                        <div className="user-message">
                                            <div>
                                                <div className="bubble">{msg.text}</div>
                                                <div className="timestamp">{msg.timestamp}</div>
                                            </div>
                                        </div>
                                    )}
                                    {msg.type === 'ai' && (
                                        <div className="ai-message">
                                            <div>
                                                <div className="bubble">{msg.text}</div>
                                                <div className="timestamp">{msg.timestamp}</div>
                                            </div>
                                        </div>
                                    )}
                                    {msg.type === 'error' && (
                                        <div style={{ maxWidth: '100%' }}>
                                            <div className="error-message">{msg.text}</div>
                                            <div className="timestamp">{msg.timestamp}</div>
                                        </div>
                                    )}
                                </div>
                            ))
                        )}
                        {loading && (
                            <div className="message">
                                <div className="ai-message">
                                    <div className="loading">
                                        <span>Claude is thinking</span>
                                        <div className="dot"></div>
                                        <div className="dot"></div>
                                        <div className="dot"></div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="input-container">
                        <div className="input-box">
                            <input
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyPress={handleKeyPress}
                                placeholder="Ask about weather... (e.g., 'What is the weather in Mumbai?')"
                                disabled={loading}
                            />
                            <button onClick={sendMessage} disabled={loading || !input.trim()}>
                                {loading ? 'Sending...' : 'Send'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<WeatherApp />, document.getElementById('root'));
    </script>
</body>
</html>
